services:
  inkcheck:
    build: .
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1536m
    cpus: 1.0
    environment:
      INKCHECK_WEB_CONCURRENCY: "1"
      INKCHECK_WEB_TIMEOUT_MS: "450000"
      INKCHECK_WEB_MAX_BODY_BYTES: "5242880"
      INKCHECK_WEB_MAX_FILES: "200"
      INKCHECK_WEB_MAX_FILE_BYTES: "2621440"
      INKCHECK_WEB_MAX_DEPTH: "1000"
      INKCHECK_WEB_MAX_STATES: "50000"
      INKCHECK_WEB_MAX_REPORT_BYTES: "83886080"
      INKCHECK_WEB_RATE_LIMIT: "10"
      INKCHECK_WEB_GLOBAL_RATE_LIMIT: "60"
      INKCHECK_WEB_RATE_WINDOW_MS: "3600000"
      INKCHECK_WEB_TRUST_PROXY: "1"
      INKCHECK_WEB_ACCESS_CODE: ${INKCHECK_WEB_ACCESS_CODE:-}
      INKCHECK_WEB_ALLOWED_ORIGINS: ${INKCHECK_WEB_ALLOWED_ORIGINS:-https://secondlandings.com}
      INKCHECK_WEB_USAGE_FILE: /var/lib/inkcheck/usage.json
    volumes:
      - inkcheck_usage:/var/lib/inkcheck
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      inkcheck:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      INKCHECK_HOST: ${INKCHECK_HOST:?Set INKCHECK_HOST to the public hostname}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
      - backend
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

networks:
  edge: {}
  backend:
    internal: true

volumes:
  inkcheck_usage: {}
  caddy_data: {}
  caddy_config: {}
